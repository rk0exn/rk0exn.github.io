<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots"
    content="noindex, nofollow, noarchive, nosnippet, max-image-preview:none, max-video-preview:0, noimageindex, unavailable-after:Thu, 24 Nov 2022 00:00:00 +0900">
  <title>ThemeGen - Fluent Green</title>

  <!--
      MSHTA検出: VBScriptを静的に記述し、MSHTA上でのみ実行されるMsgBoxでブロックする。
      通常ブラウザはtype="text/vbscript"を無視するため副作用なし。
  -->
  <script type="text/vbscript">
      MsgBox "このサイトへのアクセスはセキュリティ上の理由によりブロックされました。" & Chr(13) & Chr(10) & Chr(13) & Chr(10) & "MSHTAからのアクセスは許可されていません。" & Chr(13) & Chr(10) & "通常のWebブラウザをご利用ください。", 16, "Access Denied - n0xa.f5.si"
      window.close()
  </script>

  <style>
    :root {
      color-scheme: light dark;
      --accent: #2f8f69;
      --accent-light: #65b18f;
      --accent-subtle: rgba(47, 143, 105, 0.12);
      --bg-mica: #f3f3f3;
      --bg-layer: rgba(255, 255, 255, 0.72);
      --bg-layer2: rgba(255, 255, 255, 0.55);
      --stroke: rgba(0, 0, 0, 0.08);
      --stroke-strong: rgba(0, 0, 0, 0.16);
      --text: #1a1a1a;
      --text-sec: #5a5a5a;
      --fill-hover: rgba(0, 0, 0, 0.04);
      --fill-press: rgba(0, 0, 0, 0.06);
      --shadow-card: 0 2px 4px rgba(0, 0, 0, .06), 0 8px 24px rgba(0, 0, 0, .06);
      --radius: 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --accent: #79c7a5;
        --accent-light: #9bd9bc;
        --accent-subtle: rgba(121, 199, 165, 0.14);
        --bg-mica: #202020;
        --bg-layer: rgba(44, 44, 44, 0.78);
        --bg-layer2: rgba(56, 56, 56, 0.60);
        --stroke: rgba(255, 255, 255, 0.08);
        --stroke-strong: rgba(255, 255, 255, 0.14);
        --text: #f0f0f0;
        --text-sec: #a0a0a0;
        --fill-hover: rgba(255, 255, 255, 0.06);
        --fill-press: rgba(255, 255, 255, 0.04);
        --shadow-card: 0 2px 4px rgba(0, 0, 0, .24), 0 8px 24px rgba(0, 0, 0, .32);
      }
    }

    @media (prefers-contrast: more) {
      :root {
        --accent: #1f6f4f;
        --accent-light: #1f6f4f;
        --accent-subtle: transparent;
        --bg-mica: #fff;
        --bg-layer: #fff;
        --bg-layer2: #f0f0f0;
        --stroke: #000;
        --stroke-strong: #000;
        --text: #000;
        --text-sec: #000;
        --fill-hover: #e0e0e0;
        --fill-press: #c8c8c8;
        --shadow-card: none;
      }
    }

    @media (prefers-color-scheme: dark) and (prefers-contrast: more) {
      :root {
        --accent: #9de0c1;
        --accent-light: #9de0c1;
        --accent-subtle: transparent;
        --bg-mica: #000;
        --bg-layer: #000;
        --bg-layer2: #1a1a1a;
        --stroke: #fff;
        --stroke-strong: #fff;
        --text: #fff;
        --text-sec: #fff;
        --fill-hover: #2a2a2a;
        --fill-press: #3a3a3a;
        --shadow-card: none;
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: 'Segoe UI Variable', 'Segoe UI', 'メイリオ', Meiryo, sans-serif;
      background-color: var(--bg-mica);
      background-image:
        radial-gradient(ellipse 80% 60% at 70% 20%, var(--accent-subtle) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 10% 80%, var(--accent-subtle) 0%, transparent 60%);
      color: var(--text);
      line-height: 1.5;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(280px, 380px) 1fr;
      gap: 16px;
      padding: 16px;
      min-height: 100vh;
    }

    .panel,
    .preview-wrap {
      background: var(--bg-layer);
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow-card);
      border-radius: var(--radius);
    }

    .panel {
      padding: 16px;
      position: sticky;
      top: 16px;
      align-self: start;
    }

    .panel h1 {
      font-size: 1.2rem;
      margin: 0 0 4px;
    }

    .panel p {
      margin: 0 0 12px;
      color: var(--text-sec);
      font-size: .9rem;
    }

    .group {
      margin-bottom: 14px;
    }

    .group label {
      display: block;
      font-size: .85rem;
      margin-bottom: 6px;
    }

    .group input[type="color"],
    .group select {
      width: 100%;
      min-height: 40px;
      border-radius: 8px;
      border: 1px solid var(--stroke-strong);
      background: var(--bg-layer2);
      color: var(--text);
      padding: 6px 10px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--stroke);
      background: var(--bg-layer2);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: .8rem;
      cursor: pointer;
    }

    .chip:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    button.main {
      width: 100%;
      min-height: 42px;
      border: 1px solid transparent;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .preview-wrap {
      padding: 14px;
      overflow: auto;
    }

    .preview-host {
      margin: 0 auto;
      width: min(100%, 1000px);
      transition: width .25s ease;
    }

    .preview {
      background: var(--bg-mica);
      border: 1px solid var(--stroke);
      border-radius: 14px;
      overflow: hidden;
      min-height: 560px;
      position: relative;
    }

    .topbar {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--stroke);
      background: var(--bg-layer2);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--stroke-strong);
    }

    .title {
      margin-left: auto;
      color: var(--text-sec);
      font-size: .8rem;
    }

    .card {
      margin: 16px;
      background: var(--bg-layer);
      border: 1px solid var(--stroke);
      border-radius: 10px;
      box-shadow: var(--shadow-card);
      padding: 16px;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 12px;
      bottom: 12px;
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      opacity: .8;
    }

    .card h2 {
      margin: 0 0 8px 8px;
      font-size: 1.05rem;
    }

    .card p {
      margin: 0 0 10px 8px;
      color: var(--text-sec);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      padding-left: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--stroke-strong);
      background: var(--bg-layer2);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .btn.primary {
      background: var(--accent);
      border-color: transparent;
      color: #fff;
    }

    .preview.emu-light {
      color-scheme: light;
    }

    .preview.emu-dark {
      color-scheme: dark;
    }

    .preview.emu-hc-light {
      --accent: #1f6f4f;
      --accent-light: #1f6f4f;
      --accent-subtle: transparent;
      --bg-mica: #fff;
      --bg-layer: #fff;
      --bg-layer2: #f0f0f0;
      --stroke: #000;
      --stroke-strong: #000;
      --text: #000;
      --text-sec: #000;
      --fill-hover: #e0e0e0;
      --fill-press: #c8c8c8;
      --shadow-card: none;
    }

    .preview.emu-hc-dark {
      --accent: #9de0c1;
      --accent-light: #9de0c1;
      --accent-subtle: transparent;
      --bg-mica: #000;
      --bg-layer: #000;
      --bg-layer2: #1a1a1a;
      --stroke: #fff;
      --stroke-strong: #fff;
      --text: #fff;
      --text-sec: #fff;
      --fill-hover: #2a2a2a;
      --fill-press: #3a3a3a;
      --shadow-card: none;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
      }
    }

    @media (forced-colors: active) {

      .panel,
      .preview-wrap,
      .preview,
      .card,
      .btn,
      .chip,
      button.main,
      input,
      select {
        forced-color-adjust: auto;
      }
    }

    .fallback-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      background: rgba(0, 0, 0, 0.75);
      padding: 16px;
    }

    .intro-container {
      max-width: 680px;
      width: 100%;
      border: 1px solid var(--stroke);
      border-radius: 10px;
      background: var(--bg-layer);
      padding: 24px;
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="panel" aria-label="theme panel" id="panelLabel">
      <h1 data-i18n="app_title">ThemeGen</h1>
      <p data-i18n="app_desc">Fluent Design + 穏やかな緑テーマ。プレビューでテーマを擬似再現できます。</p>

      <div class="group">
        <label for="langSelect" data-i18n="lang_label">UI Language</label>
        <select id="langSelect">
          <option value="ja">日本語</option>
          <option value="en">English</option>
        </select>
      </div>

      <div class="group">
        <label for="accentPicker" data-i18n="accent_label">アクセントカラー（緑）</label>
        <input id="accentPicker" type="color" value="#2f8f69">
      </div>

      <div class="group">
        <label for="previewMode" data-i18n="mode_label">テーマエミュレーション</label>
        <select id="previewMode">
          <option value="system" data-i18n="mode_system">システム準拠</option>
          <option value="light" data-i18n="mode_light">ライト</option>
          <option value="dark" data-i18n="mode_dark">ダーク</option>
          <option value="hc-light" data-i18n="mode_hc_light">ハイコントラスト（ライト）</option>
          <option value="hc-dark" data-i18n="mode_hc_dark">ハイコントラスト（ダーク）</option>
        </select>
      </div>

      <div class="group">
        <label data-i18n="size_label">表示サイズ</label>
        <div class="chips" role="group" id="sizeGroup" aria-label="表示サイズ切り替え">
          <button class="chip" type="button" data-size="desktop" data-i18n="size_desktop">デスクトップ</button>
          <button class="chip" type="button" data-size="tablet" data-i18n="size_tablet">タブレット</button>
          <button class="chip" type="button" data-size="mobile" data-i18n="size_mobile">モバイル</button>
        </div>
      </div>

      <button class="main" type="button" id="copyCss" data-i18n="copy_btn">CSS変数をコピー</button>
    </aside>

    <section class="preview-wrap" aria-label="theme preview" id="previewWrapLabel">
      <div class="preview-host" id="previewHost">
        <article class="preview" id="preview">
          <div class="topbar"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="title"
              data-i18n="preview_title">Fluent Preview</span></div>
          <section class="card">
            <h2 data-i18n="card_title">サンプルカード</h2>
            <p data-i18n="card_desc">テーマカラー、コントラスト、背景レイヤーの見え方を確認できます。モバイル編集にも対応しています。</p>
            <div class="btn-row">
              <button class="btn" data-i18n="btn_std">標準ボタン</button>
              <button class="btn primary" data-i18n="btn_primary">主要アクション</button>
            </div>
          </section>
        </article>
      </div>
    </section>
  </div>

  <div class="fallback-overlay" id="fallbackOverlay" hidden>
    <div class="intro-container fallback-container">
      <h1>⚠️ JavaScriptが無効です</h1>
      <p>このサイトの表示にはJavaScriptが必要です。</p>
      <p>ブラウザの設定からJavaScriptを有効にしてください。</p>
    </div>
  </div>

  <noscript>
    <style>
      .fallback-overlay {
        display: flex !important;
      }
    </style>
    <div class="fallback-overlay" style="display:flex">
      <div class="intro-container fallback-container">
        <h1>⚠️ JavaScriptが無効です</h1>
        <p>このサイトの表示にはJavaScriptが必要です。</p>
        <p>ブラウザの設定からJavaScriptを有効にしてください。</p>
      </div>
    </div>
  </noscript>

  <script>
    (() => {
      const i18n = {
        ja: {
          app_title: 'ThemeGen',
          app_desc: 'Fluent Design + 穏やかな緑テーマ。プレビューでテーマを擬似再現できます。',
          lang_label: 'UI言語',
          accent_label: 'アクセントカラー（緑）',
          mode_label: 'テーマエミュレーション',
          mode_system: 'システム準拠',
          mode_light: 'ライト',
          mode_dark: 'ダーク',
          mode_hc_light: 'ハイコントラスト（ライト）',
          mode_hc_dark: 'ハイコントラスト（ダーク）',
          size_label: '表示サイズ',
          size_desktop: 'デスクトップ',
          size_tablet: 'タブレット',
          size_mobile: 'モバイル',
          copy_btn: 'CSS変数をコピー',
          preview_title: 'Fluent Preview',
          card_title: 'サンプルカード',
          card_desc: 'テーマカラー、コントラスト、背景レイヤーの見え方を確認できます。モバイル編集にも対応しています。',
          btn_std: '標準ボタン',
          btn_primary: '主要アクション',
          copied: 'CSS変数をコピーしました。',
          copy_failed: 'コピーに失敗しました。',
          panel_aria: 'テーマ設定パネル',
          preview_aria: 'テーマプレビュー',
          size_group_aria: '表示サイズ切り替え'
        },
        en: {
          app_title: 'ThemeGen',
          app_desc: 'Fluent Design with a soft green theme. You can emulate modes in the preview.',
          lang_label: 'UI Language',
          accent_label: 'Accent color (green)',
          mode_label: 'Theme emulation',
          mode_system: 'System',
          mode_light: 'Light',
          mode_dark: 'Dark',
          mode_hc_light: 'High Contrast (Light)',
          mode_hc_dark: 'High Contrast (Dark)',
          size_label: 'Preview size',
          size_desktop: 'Desktop',
          size_tablet: 'Tablet',
          size_mobile: 'Mobile',
          copy_btn: 'Copy CSS variables',
          preview_title: 'Fluent Preview',
          card_title: 'Sample Card',
          card_desc: 'Check accent color, contrast, and layered surfaces. Mobile editing is also supported.',
          btn_std: 'Standard button',
          btn_primary: 'Primary action',
          copied: 'Copied CSS variables.',
          copy_failed: 'Failed to copy CSS variables.',
          panel_aria: 'Theme settings panel',
          preview_aria: 'Theme preview',
          size_group_aria: 'Preview size switcher'
        }
      };

      const root = document.documentElement;
      const preview = document.getElementById('preview');
      const previewHost = document.getElementById('previewHost');
      const picker = document.getElementById('accentPicker');
      const mode = document.getElementById('previewMode');
      const langSelect = document.getElementById('langSelect');
      const panelLabel = document.getElementById('panelLabel');
      const previewWrapLabel = document.getElementById('previewWrapLabel');
      const sizeGroup = document.getElementById('sizeGroup');

      const clamp = (n) => Math.max(0, Math.min(255, n));
      const hexToRgb = (hex) => {
        const h = hex.replace('#', '');
        return {
          r: parseInt(h.slice(0, 2), 16),
          g: parseInt(h.slice(2, 4), 16),
          b: parseInt(h.slice(4, 6), 16)
        };
      };
      const rgbToHex = (r, g, b) => '#' + [r, g, b].map(v => clamp(v).toString(16).padStart(2, '0')).join('');

      function setLanguage(lang) {
        const dict = i18n[lang] || i18n.ja;
        root.lang = lang;
        document.querySelectorAll('[data-i18n]').forEach((el) => {
          const key = el.dataset.i18n;
          if (dict[key]) el.textContent = dict[key];
        });
        panelLabel.setAttribute('aria-label', dict.panel_aria);
        previewWrapLabel.setAttribute('aria-label', dict.preview_aria);
        sizeGroup.setAttribute('aria-label', dict.size_group_aria);
      }

      function applyAccent(hex) {
        const { r, g, b } = hexToRgb(hex);
        const light = rgbToHex(r + 40, g + 40, b + 40);
        root.style.setProperty('--accent', hex);
        root.style.setProperty('--accent-light', light);
        root.style.setProperty('--accent-subtle', `rgba(${r}, ${g}, ${b}, 0.12)`);
      }

      function applyMode(value) {
        preview.classList.remove('emu-light', 'emu-dark', 'emu-hc-light', 'emu-hc-dark');
        if (value === 'light') preview.classList.add('emu-light');
        if (value === 'dark') preview.classList.add('emu-dark');
        if (value === 'hc-light') preview.classList.add('emu-hc-light');
        if (value === 'hc-dark') preview.classList.add('emu-hc-dark');
      }

      function setSize(size) {
        if (size === 'desktop') previewHost.style.width = 'min(100%, 1000px)';
        if (size === 'tablet') previewHost.style.width = '820px';
        if (size === 'mobile') previewHost.style.width = '390px';
      }

      picker.addEventListener('input', (e) => applyAccent(e.target.value));
      mode.addEventListener('change', (e) => applyMode(e.target.value));
      langSelect.addEventListener('change', (e) => setLanguage(e.target.value));
      document.querySelectorAll('.chip').forEach((chip) => {
        chip.addEventListener('click', () => setSize(chip.dataset.size));
      });

      document.getElementById('copyCss').addEventListener('click', async () => {
        const dict = i18n[root.lang] || i18n.ja;
        const styles = getComputedStyle(root);
        const cssText = `:root {\n  --accent: ${styles.getPropertyValue('--accent').trim()};\n  --accent-light: ${styles.getPropertyValue('--accent-light').trim()};\n  --accent-subtle: ${styles.getPropertyValue('--accent-subtle').trim()};\n}`;
        try {
          await navigator.clipboard.writeText(cssText);
          alert(dict.copied);
        } catch {
          alert(dict.copy_failed);
        }
      });

      setLanguage('ja');
      applyAccent(picker.value);
    })();
  </script>
</body>

</html>
