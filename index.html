    <!--
        MSHTA検出: VBScriptを静的に記述し、MSHTA上でのみ実行されるMsgBoxでブロックする。
        通常ブラウザはtype="text/vbscript"を無視するため副作用なし。
    -->
    <script type="text/vbscript">
        MsgBox "このサイトへのアクセスはセキュリティ上の理由によりブロックされました。" & Chr(13) & Chr(10) & Chr(13) & Chr(10) & "MSHTAからのアクセスは許可されていません。" & Chr(13) & Chr(10) & "通常のWebブラウザをご利用ください。", 16, "Access Denied - n0xa.f5.si"
        window.close()
    </script>
</head>

<body>

    <main class="main-content" id="mainContent" aria-live="polite">

            <div class="loader-ring"></div>
        </div>
    </main>

    <footer class="footer">
        Copyright (c) 2025 - 2026 rk0exn All rights reserved.
    </footer>

    <!-- レガシーブラウザ検出: type="module"非対応環境でのみ実行される -->
    <script nomodule>
        document.documentElement.setAttribute('data-env', 'legacy');
    </script>

    <div class="fallback-overlay" id="fallbackOverlay" hidden>
        <div class="intro-container fallback-container">
            <h1 id="fallbackTitle">⚠️ このブラウザには対応していません</h1>
            <p id="fallbackDesc"></p>
            <p id="fallbackDesc2"></p>
            <ul id="fallbackList"></ul>
        </div>
    </div>

    <noscript>
        <style>.fallback-overlay { display: flex !important; }</style>
        <div class="fallback-overlay" style="display:flex">
            <div class="intro-container fallback-container">
                <h1>⚠️ JavaScriptが無効です</h1>
                <p>このサイトの表示にはJavaScriptが必要です。</p>
                <p>ブラウザの設定からJavaScriptを有効にしてください。</p>
            </div>
        </div>
    </noscript>

    <script type="module" src="./router.js"></script>

    <script nomodule>
        document.getElementById('fallbackOverlay').hidden = false;
    </script>

    <script>
        (function () {
            var overlay = document.getElementById('fallbackOverlay');
            var title   = document.getElementById('fallbackTitle');
            var desc    = document.getElementById('fallbackDesc');
            var desc2   = document.getElementById('fallbackDesc2');
            var list    = document.getElementById('fallbackList');
            var browsers = [
                'Microsoft Edge（最新版）',
                'Google Chrome（最新版）',
                'Mozilla Firefox（最新版）',
                'Apple Safari（最新版）'
            ];

            function showFallback(titleText, d1, d2, items) {
                title.textContent = titleText;
                desc.textContent  = d1;
                desc2.textContent = d2;
                var html = '';
                for (var i = 0; i < items.length; i++) {
                    html += '<li>' + items[i] + '</li>';
                }
                list.innerHTML = html;
                overlay.hidden = false;
            }

            if (document.documentElement.getAttribute('data-env') === 'legacy') {
                showFallback(
                    '⚠️ このブラウザには対応していません',
                    'このサイトはInternet Explorerおよびレガシーブラウザに対応していません。',
                    '以下のいずれかのブラウザをご利用ください。',
                    browsers
                );
            }
        })();
    </script>
</body>
