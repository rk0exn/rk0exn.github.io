<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light dark">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="robots"
        content="noindex, nofollow, noarchive, nosnippet, max-image-preview:none, max-video-preview:0, noimageindex, unavailable-after:Thu, 24 Nov 2022 00:00:00 +0900">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    <title>n0xa.f5.si - TemplateHost</title>
    <link rel="stylesheet" href="./template_global.css">
</head>

<body>
    <nav class="navbar" id="navbar">
        <div class="nav-brand">
            <a href="#pageName" class="nav-brand-link">ブランド名</a>
        </div>

        <button class="nav-hamburger" id="navHamburger" aria-label="メニューを開く" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>

        <ul class="nav-links" id="navLinks" role="list">
            <li><a href="#pageName" class="nav-link" data-page="pageName">ページ名</a></li>
        </ul>
    </nav>

    <main class="main-content" id="mainContent" aria-live="polite">
        <div class="page-loader" id="pageLoader">
            <div class="loader-ring"></div>
        </div>
    </main>

    <footer class="footer">
        Copyright (c) 2025 - 2026 rk0exn All rights reserved.
    </footer>

    <!-- IE検出: type="module"非対応ブラウザでのみ実行される -->
    <script nomodule>
        document.documentElement.classList.add('is-legacy-browser');
    </script>

    <div class="fallback-overlay" id="fallbackOverlay" hidden>
        <div class="intro-container fallback-container">
            <h1>⚠️ このブラウザには対応していません</h1>
            <p>このサイトはInternet Explorerおよびレガシーブラウザに対応していません。</p>
            <p>また、JavaScriptが無効になっている場合も正しく表示されません。</p>
            <p>以下のいずれかをご利用ください。</p>
            <ul>
                <li>Microsoft Edge（最新版）</li>
                <li>Google Chrome（最新版）</li>
                <li>Mozilla Firefox（最新版）</li>
                <li>Apple Safari（最新版）</li>
            </ul>
        </div>
    </div>

    <noscript>
        <style>.fallback-overlay { display: flex !important; }</style>
    </noscript>

    <script type="module" src="./Template_router.js"></script>

    <script nomodule>
        document.getElementById('fallbackOverlay').hidden = false;
    </script>
</body>

</html>
