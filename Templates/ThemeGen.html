<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light dark">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fluent Theme Generator (beta)</title>
<script type="text/vbscript">
MsgBox "MSHTAからのアクセスは許可されていません。", 16, "Access Denied"
window.close()
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
    --ui-bg:#f5f5f5;--ui-surf:#fff;--ui-text:#1a1a1a;--ui-sec:#666;
    --ui-bdr:#e0e0e0;--ui-blt:#e8e8e8;--ui-hov:#f0f0f0;
    --ui-acc:#3a8c5c;
}
@media(prefers-color-scheme:dark){:root{
    --ui-bg:#1a1a1a;--ui-surf:#2a2a2a;--ui-text:#e0e0e0;--ui-sec:#999;
    --ui-bdr:#3a3a3a;--ui-blt:#333;--ui-hov:#333;
    --ui-acc:#4a9d7a;
}}
body{font-family:'Segoe UI Variable','Segoe UI',system-ui,sans-serif;background:var(--ui-bg);color:var(--ui-text);line-height:1.6;overflow-x:hidden;}
.app{display:grid;grid-template-columns:360px 1fr;height:100vh;}
.panel{background:var(--ui-surf);border-right:1px solid var(--ui-bdr);padding:20px;overflow-y:auto;box-shadow:2px 0 12px rgba(0,0,0,.04);}
.ph h1{font-size:21px;font-weight:700;margin-bottom:5px;
    background:linear-gradient(135deg,var(--ui-acc),#2a6b44);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.ph p{font-size:12px;color:var(--ui-sec);margin-bottom:20px;}
.sec{margin-bottom:14px;background:var(--ui-surf);border-radius:10px;padding:14px;border:1px solid var(--ui-blt);box-shadow:0 2px 8px rgba(0,0,0,.04);animation:fi .3s ease forwards;}
.sec h2{font-size:12px;font-weight:600;margin-bottom:10px;color:var(--ui-text);display:flex;align-items:center;gap:7px;}
.sec h2::before{content:'';width:3px;height:13px;background:var(--ui-acc);border-radius:2px;flex-shrink:0;}
.cr{display:grid;grid-template-columns:50px 1fr 64px;gap:8px;align-items:center;margin-bottom:9px;}
.cr:last-child{margin-bottom:0;}
.sw{width:50px;height:42px;border-radius:7px;border:2px solid var(--ui-bdr);cursor:pointer;position:relative;overflow:hidden;}
.sw:hover{transform:scale(1.05);}
.sw input[type=color]{position:absolute;width:200%;height:200%;top:-50%;left:-50%;border:none;cursor:pointer;}
.slw{display:flex;flex-direction:column;gap:3px;}
.sll{font-size:11px;color:var(--ui-sec);font-weight:500;}
input[type=range]{width:100%;height:5px;border-radius:3px;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--ui-surf);border:2px solid var(--ui-acc);cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.2);}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2);}
.val{font-size:12px;font-weight:600;color:var(--ui-text);text-align:right;font-variant-numeric:tabular-nums;}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.tb{padding:9px 10px;border:2px solid var(--ui-bdr);border-radius:7px;background:var(--ui-surf);color:var(--ui-text);cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;transition:all .15s;}
.tb:hover{border-color:var(--ui-acc);background:var(--ui-hov);}
.tb.on{border-color:var(--ui-acc);background:var(--ui-acc);color:#fff;}
.acts{display:flex;flex-direction:column;gap:7px;}
.btn{padding:9px 14px;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;}
.bp{background:var(--ui-acc);color:#fff;}
.bp:hover{filter:brightness(.92);transform:translateY(-1px);}
.bs{background:var(--ui-hov);color:var(--ui-text);border:1px solid var(--ui-bdr);}
.bs:hover{background:var(--ui-bdr);}
.warn-box{display:none;margin-top:10px;padding:9px 12px;border-radius:7px;background:#fff7e0;border:1px solid #f0c060;font-size:11.5px;color:#7a4f00;line-height:1.5;}
.warn-box.show{display:block;}
@media(prefers-color-scheme:dark){.warn-box{background:#2a2000;border-color:#6a4a00;color:#f0c060;}}
.parea{padding:18px;overflow-y:auto;background:var(--ui-bg);display:flex;flex-direction:column;gap:14px;}
.pwrap{background:var(--ui-surf);border-radius:10px;padding:18px;box-shadow:0 4px 16px rgba(0,0,0,.07);border:1px solid var(--ui-bdr);flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.pframe{border-radius:7px;overflow:auto;box-shadow:0 2px 12px rgba(0,0,0,.08);transition:max-width .3s;flex:1;min-height:540px;}
.pframe.mobile{max-width:375px;margin:0 auto;}
.pframe.desktop{max-width:100%;}
.codeblk{background:var(--ui-surf);border:1px solid var(--ui-bdr);border-radius:8px;padding:14px;font-family:'Cascadia Code',Consolas,monospace;font-size:11px;line-height:1.6;overflow-x:auto;max-height:360px;overflow-y:auto;display:none;}
.codeblk.show{display:block;}
.codeblk pre{margin:0;white-space:pre;}
@keyframes fi{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
.sec:nth-child(1){animation-delay:.00s;}.sec:nth-child(2){animation-delay:.04s;}.sec:nth-child(3){animation-delay:.08s;}.sec:nth-child(4){animation-delay:.12s;}
@media(max-width:900px){.app{grid-template-columns:1fr;grid-template-rows:auto 1fr;}.panel{border-right:none;border-bottom:1px solid var(--ui-bdr);max-height:50vh;}}
</style>
</head>
<body>
<div class="app">
<aside class="panel">
    <div class="ph">
        <h1>Fluent Theme Generator (beta)</h1>
        <p>1つのカラーから Light / Dark / ハイコントラストテーマを生成</p>
    </div>
    <div class="sec">
        <h2>ベースカラー</h2>
        <div class="cr">
            <div class="sw"><input type="color" id="cp" value="#4a9d7a"></div>
            <div class="slw"><span class="sll">Hue</span><input type="range" id="hs" min="0" max="360" value="145"></div>
            <div class="val" id="hv">145°</div>
        </div>
        <div class="cr">
            <div></div>
            <div class="slw"><span class="sll">Saturation</span><input type="range" id="ss" min="0" max="100" value="38"></div>
            <div class="val" id="sv">38%</div>
        </div>
        <div class="cr">
            <div></div>
            <div class="slw"><span class="sll">Lightness</span><input type="range" id="ls" min="0" max="100" value="42"></div>
            <div class="val" id="lv">42%</div>
        </div>
        <div class="warn-box" id="warnBox">
            ⚠️ このベースカラーは、一部のテーマで見えにくい色となる可能性があります。
        </div>
    </div>
    <div class="sec">
        <h2>プレビューテーマ</h2>
        <div class="tg">
            <button class="tb on" data-th="light">ライト</button>
            <button class="tb" data-th="dark">ダーク</button>
            <button class="tb" data-th="hc-light">HC ライト</button>
            <button class="tb" data-th="hc-dark">HC ダーク</button>
        </div>
    </div>
    <div class="sec">
        <h2>デバイスプレビュー</h2>
        <div class="tg">
            <button class="tb on" data-dv="desktop">Desktop</button>
            <button class="tb" data-dv="mobile">Mobile</button>
        </div>
    </div>
    <div class="sec">
        <h2>エクスポート</h2>
        <div class="acts">
            <button class="btn bp" id="cpyBtn">📋 CSSをコピー</button>
            <button class="btn bs" id="dlBtn">💾 CSSをダウンロード</button>
            <button class="btn bs" id="ctBtn">🔍 コードを表示</button>
        </div>
    </div>
</aside>
<main class="parea">
    <div class="pwrap">
        <div class="pframe desktop" id="pframe"></div>
    </div>
    <div class="codeblk" id="cblk"><pre id="cpre"></pre></div>
</main>
</div>

<script>
var S={h:145,s:38,l:42,theme:'light',dev:'desktop'};

function hslHex(h,s,l){
    l/=100;var a=s*Math.min(l,1-l)/100;
    function f(n){var k=(n+h/30)%12,c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');}
    return'#'+f(0)+f(8)+f(4);
}
function hexHsl(hex){
    var r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
    var mx=Math.max(r,g,b),mn=Math.min(r,g,b),h,s,l=(mx+mn)/2;
    if(mx===mn){h=s=0;}else{var d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);if(mx===r)h=((g-b)/d+(g<b?6:0))/6;else if(mx===g)h=((b-r)/d+2)/6;else h=((r-g)/d+4)/6;}
    return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}

function relativeLum(r,g,b){
    function ch(c){c/=255;return c<=.03928?c/12.92:Math.pow((c+.055)/1.055,2.4);}
    return .2126*ch(r)+.7152*ch(g)+.0722*ch(b);
}
function hexLum(hex){
    return relativeLum(
        parseInt(hex.slice(1,3),16),
        parseInt(hex.slice(3,5),16),
        parseInt(hex.slice(5,7),16)
    );
}
function contrastRatio(l1,l2){
    var hi=Math.max(l1,l2),lo=Math.min(l1,l2);
    return(hi+.05)/(lo+.05);
}
function checkContrast(h,s,l){
    var hex=hslHex(h,s,l);
    var lum=hexLum(hex);
    var onWhite=contrastRatio(lum,1);
    var onBlack=contrastRatio(lum,0);
    return onWhite<3.0||onBlack<3.0;
}

function updateSliderGradients(){
    var hs=document.getElementById('hs');
    var ss=document.getElementById('ss');
    var ls=document.getElementById('ls');
    
    var hGrad='linear-gradient(to right';
    for(var i=0;i<=360;i+=30){
        hGrad+=',hsl('+i+',100%,50%)';
    }
    hGrad+=')';
    hs.style.background=hGrad;
    
    var sGrad='linear-gradient(to right,hsl('+S.h+',0%,50%),hsl('+S.h+',100%,50%))';
    ss.style.background=sGrad;
    
    var lGrad='linear-gradient(to right,hsl('+S.h+','+S.s+'%,0%),hsl('+S.h+','+S.s+'%,50%),hsl('+S.h+','+S.s+'%,100%))';
    ls.style.background=lGrad;
}

function tok(h,s,l,th){
    var cl=function(v,lo,hi){return Math.max(lo,Math.min(hi,v));};
    var t={};
    if(th==='light'){
        t.accent='hsl('+h+','+s+'%,'+l+'%)';
        t.accentLt='hsl('+h+','+cl(s+15,0,100)+'%,'+cl(l+22,0,85)+'%)';
        t.accentSub='hsla('+h+','+s+'%,'+l+'%,.12)';
        t.bgMica='#f3f3f3';t.bgLayer='rgba(255,255,255,.72)';t.bgLayer2='rgba(255,255,255,.55)';
        t.stroke='rgba(0,0,0,.08)';t.strokeSt='rgba(0,0,0,.16)';
        t.text='#1a1a1a';t.textSec='#5a5a5a';
        t.fillHov='rgba(0,0,0,.04)';t.fillPress='rgba(0,0,0,.06)';
        t.footerBg='rgba(240,240,240,.88)';t.footerText='#333';
        t.shadow='0 2px 4px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.06)';
        t.g1='radial-gradient(ellipse 80% 60% at 70% 20%,hsla('+h+','+s+'%,'+l+'%,.12) 0%,transparent 60%)';
        t.g2='radial-gradient(ellipse 50% 40% at 10% 80%,hsla('+h+','+s+'%,'+l+'%,.12) 0%,transparent 60%)';
        t.bw='1px';t.activeH='2px';t.blur='blur(32px) saturate(1.8)';t.navBlur='blur(24px) saturate(1.6)';
        t.inputBg='rgba(255,255,255,.9)';t.inputBdr='rgba(0,0,0,.25)';
        t.disTxt='rgba(0,0,0,.3)';t.disBg='rgba(0,0,0,.04)';t.ckColor='#ffffff';t.isHC=false;
        t.dangerBg='rgba(196,32,28,.12)';t.dangerTxt='#c4201c';t.dangerBdr='none';
        t.warnBar='#c17b00';t.okBar='#1da462';
    } else if(th==='dark'){
        var cl2=function(v,lo,hi){return Math.max(lo,Math.min(hi,v));};
        var as=cl2(s+8,0,90),al=cl2(l+5,0,50);
        t.accent='hsl('+h+','+as+'%,'+al+'%)';
        t.accentLt='hsl('+h+','+cl2(s+12,0,100)+'%,'+cl2(l+12,0,60)+'%)';
        t.accentSub='hsla('+h+','+as+'%,'+al+'%,.14)';
        t.bgMica='#202020';t.bgLayer='rgba(44,44,44,.78)';t.bgLayer2='rgba(56,56,56,.60)';
        t.stroke='rgba(255,255,255,.08)';t.strokeSt='rgba(255,255,255,.14)';
        t.text='#f0f0f0';t.textSec='#9a9a9a';
        t.fillHov='rgba(255,255,255,.06)';t.fillPress='rgba(255,255,255,.04)';
        t.footerBg='rgba(28,28,28,.92)';t.footerText='#9a9a9a';
        t.shadow='0 2px 4px rgba(0,0,0,.24),0 8px 24px rgba(0,0,0,.32)';
        t.g1='radial-gradient(ellipse 80% 60% at 70% 20%,hsla('+h+','+as+'%,'+al+'%,.14) 0%,transparent 60%)';
        t.g2='radial-gradient(ellipse 50% 40% at 10% 80%,hsla('+h+','+as+'%,'+al+'%,.14) 0%,transparent 60%)';
        t.bw='1px';t.activeH='2px';t.blur='blur(32px) saturate(1.8)';t.navBlur='blur(24px) saturate(1.6)';
        t.inputBg='rgba(255,255,255,.07)';t.inputBdr='rgba(255,255,255,.25)';
        t.disTxt='rgba(255,255,255,.28)';t.disBg='rgba(255,255,255,.04)';t.ckColor='#000000';t.isHC=false;
        t.dangerBg='rgba(196,32,28,.15)';t.dangerTxt='#f08080';t.dangerBdr='none';
        t.warnBar='#c17b00';t.okBar='#1da462';
    } else if(th==='hc-light'){
        var cl3=function(v,lo,hi){return Math.max(lo,Math.min(hi,v));};
        t.accent='hsl('+h+','+cl3(s-5,30,100)+'%,'+cl3(l-10,20,50)+'%)';
        t.accentLt=t.accent;t.accentSub='transparent';
        t.bgMica='#ffffff';t.bgLayer='#ffffff';t.bgLayer2='#f0f0f0';
        t.stroke='#000000';t.strokeSt='#000000';t.text='#000000';t.textSec='#000000';
        t.fillHov='#e0e0e0';t.fillPress='#c8c8c8';t.footerBg='#ffffff';t.footerText='#000000';
        t.shadow='none';t.g1='none';t.g2='none';
        t.bw='2px';t.activeH='3px';t.blur='none';t.navBlur='none';
        t.inputBg='#ffffff';t.inputBdr='#000000';t.disTxt='#767676';t.disBg='#e0e0e0';
        t.ckColor='#ffffff';t.isHC=true;
        t.dangerBg='transparent';t.dangerTxt='#000000';t.dangerBdr=t.bw+' solid #000000';
        t.warnBar=t.accent;t.okBar=t.accent;
    } else {
        var cl4=function(v,lo,hi){return Math.max(lo,Math.min(hi,v));};
        t.accent='hsl('+h+','+cl4(s+10,0,85)+'%,'+cl4(l+5,0,45)+'%)';
        t.accentLt=t.accent;t.accentSub='transparent';
        t.bgMica='#000000';t.bgLayer='#000000';t.bgLayer2='#1a1a1a';
        t.stroke='#ffffff';t.strokeSt='#ffffff';t.text='#ffffff';t.textSec='#ffffff';
        t.fillHov='#2a2a2a';t.fillPress='#3a3a3a';t.footerBg='#000000';t.footerText='#ffffff';
        t.shadow='none';t.g1='none';t.g2='none';
        t.bw='2px';t.activeH='3px';t.blur='none';t.navBlur='none';
        t.inputBg='#000000';t.inputBdr='#ffffff';t.disTxt='rgba(255,255,255,.35)';t.disBg='#1a1a1a';
        t.ckColor='#000000';t.isHC=true;
        t.dangerBg='transparent';t.dangerTxt='#ffffff';t.dangerBdr=t.bw+' solid #ffffff';
        t.warnBar=t.accent;t.okBar=t.accent;
    }
    return t;
}

function buildPreview(){
    var T=tok(S.h,S.s,S.l,S.theme);
    var hc=T.isHC;
    var host=document.getElementById('pframe');
    var root=host._shadow;
    if(!root){root=host.attachShadow({mode:'open'});host._shadow=root;}

    var css=[
        '*{margin:0;padding:0;box-sizing:border-box;}',
        '.root{min-height:540px;background:'+T.bgMica+';background-image:'+T.g1+','+T.g2+';color:'+T.text+';font-family:"Segoe UI Variable","Segoe UI","メイリオ",Meiryo,sans-serif;font-size:14px;line-height:1.6;}',
        '.nb{position:sticky;top:0;width:100%;height:48px;background:'+T.footerBg+';backdrop-filter:'+T.navBlur+';-webkit-backdrop-filter:'+T.navBlur+';border-bottom:'+T.bw+' solid '+T.stroke+';display:flex;align-items:center;padding:0 16px;z-index:200;box-sizing:border-box;gap:4px;}',
        '.nb-brand{font-size:14px;font-weight:700;color:'+T.text+';padding:4px 10px;border-radius:4px;letter-spacing:.04em;cursor:pointer;transition:background .15s;white-space:nowrap;flex-shrink:0;}',
        '.nb-brand:hover{background:'+T.fillHov+';}',
        '.nb-links{display:flex;align-items:center;gap:2px;list-style:none;margin:0 0 0 8px;padding:0;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;}',
        '.nb-links::-webkit-scrollbar{display:none;}',
        '.nb-lnk{display:inline-flex;align-items:center;color:'+T.textSec+';font-size:13px;font-weight:500;padding:5px 12px;border-radius:4px;white-space:nowrap;cursor:pointer;position:relative;transition:background .15s,color .15s;}',
        '.nb-lnk:hover{background:'+T.fillHov+';color:'+T.text+';}',
        '.nb-lnk:active{background:'+T.fillPress+';}',
        '.nb-lnk.active{color:'+T.accent+';background:'+T.accentSub+';}',
        hc?'.nb-lnk.active::before{display:none;}':'.nb-lnk.active::before{content:"";position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:20px;height:'+T.activeH+';border-radius:2px 2px 0 0;background:'+T.accent+';}',
        '.nb-ham{display:none;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;padding:6px;margin-left:auto;background:transparent;border:none;border-radius:4px;cursor:pointer;flex-shrink:0;transition:background .15s;}',
        '.nb-ham:hover{background:'+T.fillHov+';}',
        '.nb-ham span{display:block;width:100%;height:1.5px;background:'+T.text+';border-radius:2px;transition:transform .2s,opacity .2s;}',
        '.nb-ham.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}',
        '.nb-ham.open span:nth-child(2){opacity:0;}',
        '.nb-ham.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}',
        '.root.narrow .nb-ham{display:flex;}',
        '.root.narrow .nb-links{display:none;position:fixed;top:48px;left:0;width:100%;background:'+T.footerBg+';backdrop-filter:'+T.navBlur+';border-bottom:'+T.bw+' solid '+T.stroke+';flex-direction:column;align-items:stretch;gap:0;padding:6px 8px 10px;margin:0;z-index:199;}',
        '.root.narrow .nb-links.open{display:flex;}',
        '.root.narrow .nb-lnk{padding:10px 14px;border-radius:4px;}',
        '.root.narrow .nb-lnk.active::before{display:none;}',
        '.mc{padding:20px 20px 80px;}',
        '.root.narrow .mc{padding:12px 12px 80px;}',
        '.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}',
        '.root.narrow .grid{grid-template-columns:1fr;}',
        '.card{background:'+T.bgLayer+';backdrop-filter:'+T.blur+';-webkit-backdrop-filter:'+T.blur+';border-radius:8px;border:'+T.bw+' solid '+T.stroke+';box-shadow:'+T.shadow+';padding:20px;position:relative;overflow:hidden;}',
        '.card-acc::before{content:"";position:absolute;left:0;top:16px;width:3px;height:calc(100% - 32px);background:'+T.accent+';border-radius:2px;opacity:'+(hc?'1':'.75')+';}',
        '.lbl{font-size:11px;font-weight:600;color:'+T.textSec+';letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}',
        '.h3{font-size:13px;font-weight:600;color:'+T.text+';margin:12px 0 4px;}',
        '.h3.first{margin-top:0;}',
        '.sep{height:1px;background:'+T.stroke+';margin:14px 0;}',
        '.hl{display:inline-flex;align-items:center;gap:4px;color:'+T.accent+';font-size:13px;font-weight:500;padding:4px 8px;margin:2px 4px 2px 0;border-radius:4px;cursor:pointer;transition:background .15s,color .15s;}',
        '.hl::after{content:"→";font-size:11px;opacity:.7;transition:transform .15s,opacity .15s;}',
        '.hl:hover{background:'+T.accentSub+';color:'+T.accentLt+';}',
        '.hl:hover::after{transform:translateX(2px);opacity:1;}',
        '.hl:active{background:'+T.fillPress+';}',

    return'@charset "UTF-8";\n\nhtml, body {\n    width: 100%;\n    overflow-x: hidden;\n    overflow-y: auto;\n    margin: 0;\n    padding: 0;\n}\n\n:root {\n    color-scheme: light dark;\n\n    --accent:        hsl('+h+', '+s+'%, '+l+'%);\n    --accent-light:  hsl('+h+', '+cl(s+15,0,100)+'%, '+cl(l+22,0,85)+'%);\n    --accent-subtle: hsla('+h+', '+s+'%, '+l+'%, 0.12);\n\n    --bg-mica:       #f3f3f3;\n    --bg-layer:      rgba(255, 255, 255, 0.72);\n    --bg-layer2:     rgba(255, 255, 255, 0.55);\n    --stroke:        rgba(0, 0, 0, 0.08);\n    --stroke-strong: rgba(0, 0, 0, 0.16);\n    --text:          #1a1a1a;\n    --text-sec:      #5a5a5a;\n    --fill-hover:    rgba(0, 0, 0, 0.04);\n    --fill-press:    rgba(0, 0, 0, 0.06);\n    --footer-bg:     rgba(240, 240, 240, 0.88);\n    --footer-text:   #333;\n    --shadow-card:   0 2px 4px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.06);\n    --radius:        8px;\n    --radius-sm:     4px;\n}\n\n@media (prefers-color-scheme: dark) {\n    :root {\n        --accent:        hsl('+h+', '+cl(s+10,0,90)+'%, '+cl(l+15,0,65)+'%);\n        --accent-light:  hsl('+h+', '+cl(s+20,0,100)+'%, '+cl(l+25,0,75)+'%);\n        --accent-subtle: hsla('+h+', '+cl(s+10,0,90)+'%, '+cl(l+15,0,65)+'%, 0.16);\n        --bg-mica:       #202020;\n        --bg-layer:      rgba(44, 44, 44, 0.78);\n        --bg-layer2:     rgba(56, 56, 56, 0.60);\n        --stroke:        rgba(255, 255, 255, 0.08);\n        --stroke-strong: rgba(255, 255, 255, 0.14);\n        --text:          #f0f0f0;\n        --text-sec:      #9a9a9a;\n        --fill-hover:    rgba(255, 255, 255, 0.06);\n        --fill-press:    rgba(255, 255, 255, 0.04);\n        --footer-bg:     rgba(28, 28, 28, 0.92);\n        --footer-text:   #9a9a9a;\n        --shadow-card:   0 2px 4px rgba(0,0,0,.24), 0 8px 24px rgba(0,0,0,.32);\n    }\n}\n\n@media (prefers-contrast: more) {\n    :root {\n        --accent:        hsl('+h+', '+cl(s-5,30,100)+'%, '+cl(l-10,20,50)+'%);\n        --accent-light:  hsl('+h+', '+cl(s-5,30,100)+'%, '+cl(l-10,20,50)+'%);\n        --accent-subtle: transparent;\n        --bg-mica:       #ffffff;\n        --bg-layer:      #ffffff;\n        --bg-layer2:     #f0f0f0;\n        --stroke:        #000000;\n        --stroke-strong: #000000;\n        --text:          #000000;\n        --text-sec:      #000000;\n        --fill-hover:    #e0e0e0;\n        --fill-press:    #c8c8c8;\n        --footer-bg:     #ffffff;\n        --footer-text:   #000000;\n        --shadow-card:   none;\n    }\n}\n\n@media (prefers-color-scheme: dark) and (prefers-contrast: more) {\n    :root {\n        --accent:        hsl('+h+', '+cl(s+20,0,85)+'%, '+cl(l+30,0,75)+'%);\n        --accent-light:  hsl('+h+', '+cl(s+20,0,85)+'%, '+cl(l+30,0,75)+'%);\n        --accent-subtle: transparent;\n        --bg-mica:       #000000;\n        --bg-layer:      #000000;\n        --bg-layer2:     #1a1a1a;\n        --stroke:        #ffffff;\n        --stroke-strong: #ffffff;\n        --text:          #ffffff;\n        --text-sec:      #ffffff;\n        --fill-hover:    #2a2a2a;\n        --fill-press:    #3a3a3a;\n        --footer-bg:     #000000;\n        --footer-text:   #ffffff;\n        --shadow-card:   none;\n    }\n}\n\nbody {\n    user-select: none;\n    background-color: var(--bg-mica);\n    background-image:\n        radial-gradient(ellipse 80% 60% at 70% 20%, var(--accent-subtle) 0%, transparent 60%),\n        radial-gradient(ellipse 50% 40% at 10% 80%, var(--accent-subtle) 0%, transparent 60%);\n    color: var(--text);\n    font-family: \'Segoe UI Variable\', \'Segoe UI\', \'メイリオ\', Meiryo, \'ヒラギノ角ゴ ProN\', \'Hiragino Kaku Gothic ProN\', sans-serif;\n    font-size: 14px;\n    line-height: 1.6;\n    margin: 0; padding: 0;\n    min-height: 100vh;\n    box-sizing: border-box;\n    transition: background-color 0.25s ease, color 0.25s ease;\n}';
}

function update(){
    document.getElementById('hv').textContent=S.h+'°';
    document.getElementById('sv').textContent=S.s+'%';
    document.getElementById('lv').textContent=S.l+'%';
    document.getElementById('cp').value=hslHex(S.h,S.s,S.l);
    document.getElementById('warnBox').classList.toggle('show', checkContrast(S.h,S.s,S.l));
    updateSliderGradients();
    buildPreview();
    document.getElementById('cpre').textContent=genCSS();
}

var _ro=new ResizeObserver(function(entries){
    requestAnimationFrame(function(){
        var host=document.getElementById('pframe');
        var sh=host._shadow;
        if(!sh) return;
        var rootEl=sh.querySelector('#root');
        if(rootEl) rootEl.classList.toggle('narrow', host.offsetWidth<600);
    });
});
_ro.observe(document.getElementById('pframe'));

document.getElementById('hs').addEventListener('input',function(e){S.h=+e.target.value;update();});
document.getElementById('ss').addEventListener('input',function(e){S.s=+e.target.value;update();});
document.getElementById('ls').addEventListener('input',function(e){S.l=+e.target.value;update();});
document.getElementById('cp').addEventListener('input',function(e){
    var r=hexHsl(e.target.value);S.h=r.h;S.s=r.s;S.l=r.l;
    document.getElementById('hs').value=r.h;
    document.getElementById('ss').value=r.s;
    document.getElementById('ls').value=r.l;
    update();
});
document.querySelectorAll('.tb').forEach(function(b){
    b.addEventListener('click',function(){
        var isTh=b.dataset.th;
        if(isTh){
            document.querySelectorAll('.tb[data-th]').forEach(function(x){x.classList.remove('on');});
            b.classList.add('on');S.theme=isTh;update();
        }else{
            document.querySelectorAll('.tb[data-dv]').forEach(function(x){x.classList.remove('on');});
            b.classList.add('on');S.dev=b.dataset.dv;
            document.getElementById('pframe').className='pframe '+S.dev;
            requestAnimationFrame(function(){
                var host=document.getElementById('pframe');
                var sh=host._shadow;
                if(!sh) return;
                var rootEl=sh.querySelector('#root');
                if(rootEl) rootEl.classList.toggle('narrow', host.offsetWidth<600);
            });
        }
    });
});
document.getElementById('cpyBtn').addEventListener('click',function(){
    navigator.clipboard.writeText(genCSS()).then(function(){
        var btn=document.getElementById('cpyBtn'),orig=btn.textContent;
        btn.textContent='✅ コピーしました';
        setTimeout(function(){btn.textContent=orig;},2000);
    });
});
document.getElementById('dlBtn').addEventListener('click',function(){
    var url=URL.createObjectURL(new Blob([genCSS()],{type:'text/css'}));
    var a=document.createElement('a');a.href=url;a.download='global.css';a.click();
    URL.revokeObjectURL(url);
});
document.getElementById('ctBtn').addEventListener('click',function(){
    var cb=document.getElementById('cblk');
    cb.classList.toggle('show');
    document.getElementById('ctBtn').textContent=cb.classList.contains('show')?'🔍 コードを隠す':'🔍 コードを表示';
});

updateSliderGradients();
update();
</script>
</body>
</html>
